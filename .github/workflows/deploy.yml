name: Deploy Hynix Brief News to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site (웹앱 파일만 + 키 주입)
        run: |
          mkdir -p _site/assets
          cp index.html _site/
          cp -r assets/* _site/assets/
          # GEMINI_API_KEY Secret 을 배포본 config.js 로 주입 (소스에는 남지 않음)
          printf 'window.HYNIX_CONFIG = { GEMINI_API_KEY: "%s", GEMINI_MODEL: "gemini-2.5-flash" };\n' "${GEMINI_API_KEY}" > _site/config.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
